<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90a4"/>
      <stop offset="100%" stop-color="#6b8e7a"/>
    </linearGradient>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(5, 5)">
    <!-- Newspaper stack -->
    <rect x="4" y="8" width="24" height="30" rx="2" fill="#f0f0f0" stroke="#4a90a4" stroke-width="1.5"/>
    <rect x="8" y="4" width="24" height="30" rx="2" fill="#f5f5f5" stroke="#4a90a4" stroke-width="1.5"/>
    <rect x="12" y="0" width="24" height="30" rx="2" fill="#ffffff" stroke="#4a90a4" stroke-width="2"/>
    
    <!-- Text lines -->
    <line x1="16" y1="6" x2="32" y2="6" stroke="#4a90a4" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="11" x2="30" y2="11" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="15" x2="28" y2="15" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="19" x2="32" y2="19" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="23" x2="26" y2="23" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Vault lock -->
    <circle cx="32" cy="32" r="8" fill="#4a90a4"/>
    <circle cx="32" cy="32" r="6" fill="#e8e8e8"/>
    <circle cx="32" cy="30.5" r="2.5" fill="none" stroke="#4a90a4" stroke-width="2"/>
    <rect x="29.5" y="31" width="5" height="4" rx="0.75" fill="#4a90a4"/>
  </g>
  
  <!-- Text: "The Chronicle Vault" -->
  <text x="55" y="22" font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#2d2d2d">
    The Chronicle
  </text>
  <text x="55" y="40" font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="url(#logo-gradient)">
    Vault
  </text>
</svg>
