<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="vault-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90a4"/>
      <stop offset="100%" stop-color="#6b8e7a"/>
    </linearGradient>
  </defs>
  <!-- Background circle with neumorphic feel -->
  <circle cx="16" cy="16" r="14" fill="#e8e8e8"/>
  <circle cx="16" cy="16" r="13" fill="url(#vault-gradient)" opacity="0.15"/>
  
  <!-- Newspaper/Document stack -->
  <rect x="8" y="9" width="12" height="15" rx="1.5" fill="#f0f0f0" stroke="#4a90a4" stroke-width="1"/>
  <rect x="10" y="7" width="12" height="15" rx="1.5" fill="#f5f5f5" stroke="#4a90a4" stroke-width="1"/>
  <rect x="12" y="5" width="12" height="15" rx="1.5" fill="#ffffff" stroke="#4a90a4" stroke-width="1.5"/>
  
  <!-- Text lines on front document -->
  <line x1="14" y1="8" x2="22" y2="8" stroke="#4a90a4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="11" x2="21" y2="11" stroke="#bebebe" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="13.5" x2="20" y2="13.5" stroke="#bebebe" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="16" x2="22" y2="16" stroke="#bebebe" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Vault lock symbol -->
  <circle cx="22" cy="22" r="6" fill="#4a90a4"/>
  <circle cx="22" cy="22" r="4.5" fill="#e8e8e8"/>
  <circle cx="22" cy="21" r="2" fill="none" stroke="#4a90a4" stroke-width="1.5"/>
  <rect x="20" y="21.5" width="4" height="3.5" rx="0.5" fill="#4a90a4"/>
</svg>
